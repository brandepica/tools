<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de SKU</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --pink: #e6007d;
      --purple: #4e2a6a;
      --purple-light: rgba(78,42,106,0.08);
    }
    body {
      font-family: system-ui, sans-serif;
      background-image: url('https://brandepica.com/firmas/Fondo_BE-01.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-color: #e8eaf0;
      min-height: 100vh;
      margin: 0;
    }
    html { background-color: #e8eaf0; }
    select, input[type="date"] {
      border: 1px solid #d1d5db;
      border-radius: 0.375rem;
      padding: 0.4rem 0.6rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="date"]:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 2px rgba(78,42,106,0.15);
    }
    .plat-card {
      background: var(--purple-light);
      border: 1.5px solid transparent;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .plat-card:hover { border-color: var(--purple); }
    .plat-card.active {
      border-color: var(--pink);
      background: rgba(230,0,125,0.08);
    }
    .plat-card .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 2px solid var(--purple);
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .plat-card.active .dot { background: var(--pink); border-color: var(--pink); }
    .plat-card label { cursor: pointer; font-size: 0.85rem; font-weight: 500; color: var(--purple); }

    .fmt-row {
      display: flex;
      align-items: center;
      border: 1.5px solid var(--purple);
      border-radius: 0.5rem;
      overflow: hidden;
      margin-bottom: 4px;
      background: white;
      animation: slideIn 0.18s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fmt-badge {
      background: var(--purple);
      color: white;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0 12px;
      height: 36px;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .fmt-select {
      flex: 1;
      border: none;
      border-left: 1px solid #d1d5db;
      border-right: 1px solid #d1d5db;
      padding: 0 8px;
      height: 36px;
      font-size: 0.85rem;
      outline: none;
      background: white;
      color: #111;
    }
    .chain-btn {
      width: 36px; height: 36px;
      border: none; background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #aaa;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .chain-btn:hover { color: var(--pink); }
    .remove-btn {
      width: 32px; height: 36px;
      border: none; background: none;
      cursor: pointer; font-size: 1rem;
      color: #aaa;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .remove-btn:hover { color: var(--pink); }

    .chain-group {
      border: 1.5px solid var(--purple);
      border-radius: 0.5rem;
      overflow: hidden;
      margin-bottom: 6px;
      animation: slideIn 0.18s ease;
    }
    .chain-header {
      background: var(--purple-light);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .chain-header-badges { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
    .chain-header-badge {
      background: var(--purple);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .chain-body {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid rgba(78,42,106,0.15);
      background: white;
    }
    .chain-note { font-size: 0.8rem; color: var(--purple); white-space: nowrap; }
    .unchain-btn {
      font-size: 0.72rem;
      border: 1px solid var(--pink);
      color: var(--pink);
      background: none;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chain-select {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.85rem;
      outline: none;
      background: white;
      color: #111;
    }
    .picker-box {
      margin-top: 4px;
      margin-bottom: 4px;
      padding: 10px 12px;
      border: 1.5px solid var(--purple);
      border-radius: 0.5rem;
      background: var(--purple-light);
      animation: slideIn 0.15s ease;
    }
    .picker-note { font-size: 0.8rem; color: var(--purple); font-weight: 500; margin: 0 0 8px; }
    .picker-peer {
      border: 1.5px solid var(--purple);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      background: white;
      color: var(--purple);
      font-weight: 500;
      transition: all 0.15s;
    }
    .picker-peer:hover { border-color: var(--pink); color: var(--pink); }

    .sku-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--purple-light);
      color: var(--purple);
      padding: 0.45rem 0.85rem;
      border-radius: 0.4rem;
      font-family: monospace;
      font-size: 0.9rem;
      margin-bottom: 6px;
      animation: slideIn 0.2s ease;
    }
    .copy-btn {
      font-size: 0.75rem;
      background: var(--purple);
      color: white;
      border: none;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .copy-btn:hover { background: var(--pink); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-2xl">
    <h1 class="text-2xl font-bold mb-6 text-center" style="color:var(--pink)">Generador de SKU</h1>

    <div class="space-y-5">
      <div class="flex gap-4">
        <div class="w-1/2">
          <label class="block font-medium mb-1 text-sm">Cliente</label>
          <select id="cliente">
            <option value="">—</option>
            <option value="ALE">Aleatica</option>
            <option value="AE">Aleatica Engage</option>
            <option value="AC">Aleatica Connect</option>
            <option value="BE">Brandépica</option>
            <option value="DAI">Daikin</option>
            <option value="ENG">Engen</option>
            <option value="EVO">Evolution</option>
            <option value="FUND">Fundación Aleatica</option>
            <option value="NIK">Nikki Weil</option>
            <option value="NUT">Nutrical</option>
            <option value="TEL">TeleVía</option>
            <option value="VAR">Varlix</option>
            <option value="WAL">Waldorf Astoria</option>
          </select>
        </div>
        <div class="w-1/2">
          <label class="block font-medium mb-1 text-sm">Submarca</label>
          <select id="submarca">
            <option value="">—</option>
          </select>
        </div>
      </div>

      <div class="w-1/2 pr-2">
        <label class="block font-medium mb-1 text-sm">Fecha</label>
        <input type="date" id="fecha" />
      </div>

      <div>
        <label class="block font-medium mb-2 text-sm">Plataformas</label>
        <div class="flex flex-wrap gap-2" id="plataformas-grid"></div>
      </div>

      <div id="formatos-container" class="space-y-2 hidden">
        <label class="block font-medium text-sm" style="color:var(--purple)">
          Formato por plataforma
          <span style="font-size:0.75rem; font-weight:400; color:#888; margin-left:6px;">— usa 🔗 para combinar en un solo SKU</span>
        </label>
        <div id="formatos-rows" class="space-y-1"></div>
      </div>

      <hr class="border-t-2" style="border-color:var(--purple)" />
      <p class="text-sm font-semibold" style="color:var(--pink)">SKUs resultantes</p>
      <div id="resultado" class="space-y-2"></div>

      <div class="flex justify-center mt-4">
        <img src="https://brandepica.com/firmas/firma-nueva-BE1.jpg" alt="Logo Brandépica"
          style="width:180px;height:35px;object-fit:contain;" />
      </div>
    </div>
  </div>

<script>
  const PLATAFORMAS = [
    { label: "Facebook",  value: "FB", formatos: [
        { label: "Imagen",    value: "IMG"   },
        { label: "Video",     value: "VIDEO" },
        { label: "Carrusel",  value: "CAR"   },
        { label: "Galería",   value: "GAL"   },
        { label: "Colección", value: "COL"   },
        { label: "Stories",   value: "STO"   },
        { label: "Reel",      value: "REEL"  },
    ]},
    { label: "Instagram", value: "IG", formatos: [
        { label: "Imagen",    value: "IMG"   },
        { label: "Video",     value: "VIDEO" },
        { label: "Carrusel",  value: "CAR"   },
        { label: "Reel",      value: "REEL"  },
        { label: "Stories",   value: "STO"   },
    ]},
    { label: "X",         value: "X",  formatos: [
        { label: "Imagen",    value: "IMG"   },
        { label: "Video",     value: "VIDEO" },
        { label: "Galería",   value: "GAL"   },
    ]},
    { label: "LinkedIn",  value: "LK", formatos: [
        { label: "Imagen",    value: "IMG"   },
        { label: "Video",     value: "VIDEO" },
        { label: "Carrusel",  value: "CAR"   },
    ]},
    { label: "TikTok",    value: "TK", formatos: [
        { label: "Video",     value: "VIDEO" },
        { label: "Imagen",    value: "IMG"   },
        { label: "Stories",   value: "STO"   },
    ]},
    { label: "YouTube",   value: "YT", formatos: [
        { label: "Video",     value: "VIDEO" },
        { label: "Thumbnail", value: "THU"   },
        { label: "Cover",     value: "COV"   },
    ]},
  ];

  const SUBMARCAS = {
    ALE: {
      "Circuito Exterior Mexiquense": "CEM",
      "Autopista Urbana Norte": "AUN",
      "Viaducto Bicentenario": "VB",
      "Autopista Urbana Norte y Viaducto Bicentenario": "AUNVB",
      "Comunicación Interna": "CoINT",
    },
    DIM: {
      "Daikin": "DAI",
      "AirCommunity": "ACOM",
      "AirTech": "ATEC",
    },
  };

  let active = new Map();
  let chains = [];

  function getCommonFormats(platValues) {
    const sets = platValues.map(v => PLATAFORMAS.find(p => p.value === v).formatos.map(f => f.value));
    return sets[0].filter(f => sets.every(s => s.includes(f)));
  }

  // Build platform cards
  const grid = document.getElementById("plataformas-grid");
  PLATAFORMAS.forEach(p => {
    const card = document.createElement("div");
    card.className = "plat-card";
    card.dataset.value = p.value;
    card.innerHTML = `<span class="dot"></span><label>${p.label}</label>`;
    card.addEventListener("click", () => togglePlatform(p.value, card));
    grid.appendChild(card);
  });

  function togglePlatform(value, card) {
    if (active.has(value)) {
      active.delete(value);
      chains = chains.map(c => c.filter(v => v !== value)).filter(c => c.length >= 2);
      card.classList.remove("active");
    } else {
      active.set(value, "");
      card.classList.add("active");
    }
    renderFormatoRows();
    generarSKU();
  }

  function renderFormatoRows() {
    const container = document.getElementById("formatos-container");
    const rows = document.getElementById("formatos-rows");
    rows.innerHTML = "";
    document.getElementById("chainPicker")?.remove();

    const activePlatValues = [...active.keys()];
    const chainedPlats = new Set(chains.flat());

    if (activePlatValues.length === 0) {
      container.classList.add("hidden");
      return;
    }
    container.classList.remove("hidden");

    // Render chain groups
    chains.forEach((group, gi) => {
      const allActive = group.every(v => active.has(v));
      if (!allActive) return;
      const common = getCommonFormats(group);
      const currentFmt = active.get(group[0]) || (common[0] || "IMG");

      const block = document.createElement("div");
      block.className = "chain-group";

      const header = document.createElement("div");
      header.className = "chain-header";
      const badges = document.createElement("div");
      badges.className = "chain-header-badges";
      group.forEach(v => {
        const pl = PLATAFORMAS.find(p => p.value === v);
        const b = document.createElement("span");
        b.className = "chain-header-badge";
        b.textContent = pl.label;
        badges.appendChild(b);
      });
      header.appendChild(badges);

      const unchainBtn = document.createElement("button");
      unchainBtn.className = "unchain-btn";
      unchainBtn.textContent = "Desligar";
      unchainBtn.onclick = () => { chains.splice(gi, 1); renderFormatoRows(); generarSKU(); };
      header.appendChild(unchainBtn);
      block.appendChild(header);

      const body = document.createElement("div");
      body.className = "chain-body";
      const note = document.createElement("span");
      note.className = "chain-note";
      note.textContent = "Formato compartido:";
      body.appendChild(note);

      const sel = document.createElement("select");
      sel.className = "chain-select";
      const opciones = common.length > 0 ? common : PLATAFORMAS.find(p => p.value === group[0]).formatos.map(f => f.value);
      opciones.forEach(fVal => {
        const platFormatos = PLATAFORMAS.find(p => p.value === group[0]).formatos;
        const fLabel = platFormatos.find(f => f.value === fVal)?.label || fVal;
        const o = document.createElement("option");
        o.value = fVal; o.textContent = fLabel;
        if (fVal === currentFmt) o.selected = true;
        sel.appendChild(o);
      });
      sel.onchange = () => { group.forEach(v => active.set(v, sel.value)); generarSKU(); };
      body.appendChild(sel);
      block.appendChild(body);

      if (common.length === 0) {
        const warn = document.createElement("div");
        warn.style.cssText = "padding:6px 10px;font-size:0.75rem;color:var(--pink);background:white;";
        warn.textContent = "⚠ Estas plataformas no comparten formatos.";
        block.appendChild(warn);
      }
      rows.appendChild(block);
    });

    // Render individual rows
    activePlatValues.forEach(val => {
      if (chainedPlats.has(val)) return;
      const plat = PLATAFORMAS.find(p => p.value === val);
      const currentFmt = active.get(val) || "";

      const row = document.createElement("div");
      row.className = "fmt-row";

      const badge = document.createElement("span");
      badge.className = "fmt-badge";
      badge.textContent = plat.label;
      row.appendChild(badge);

      const sel = document.createElement("select");
      sel.className = "fmt-select";
      sel.innerHTML = `<option value="">— Formato —</option>` +
        plat.formatos.map(f =>
          `<option value="${f.value}"${currentFmt === f.value ? " selected" : ""}>${f.label}</option>`
        ).join("");
      sel.addEventListener("change", () => { active.set(val, sel.value); generarSKU(); });
      row.appendChild(sel);

      const unchainedPeers = activePlatValues.filter(v => v !== val && !chainedPlats.has(v));
      if (unchainedPeers.length > 0) {
        const chainBtn = document.createElement("button");
        chainBtn.className = "chain-btn";
        chainBtn.title = "Ligar con otra plataforma";
        chainBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 8.5a2.5 2.5 0 0 0 2.5 2.5H11a2.5 2.5 0 0 0 0-5H9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 7.5a2.5 2.5 0 0 0-2.5-2.5H5a2.5 2.5 0 0 0 0 5H6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
        chainBtn.onclick = () => showChainPicker(val, unchainedPeers, chainBtn, row);
        row.appendChild(chainBtn);
      }

      const removeBtn = document.createElement("button");
      removeBtn.className = "remove-btn";
      removeBtn.title = "Quitar plataforma";
      removeBtn.textContent = "✕";
      removeBtn.addEventListener("click", () => {
        active.delete(val);
        chains = chains.map(c => c.filter(v => v !== val)).filter(c => c.length >= 2);
        const card = document.querySelector(`.plat-card[data-value="${val}"]`);
        if (card) card.classList.remove("active");
        renderFormatoRows();
        generarSKU();
      });
      row.appendChild(removeBtn);
      rows.appendChild(row);
    });
  }

  function showChainPicker(val, peers, btn, row) {
    const existing = document.getElementById("chainPicker");
    if (existing) { existing.remove(); return; }

    const picker = document.createElement("div");
    picker.id = "chainPicker";
    picker.className = "picker-box";

    const note = document.createElement("p");
    note.className = "picker-note";
    note.textContent = "¿Con cuál ligar " + PLATAFORMAS.find(p => p.value === val).label + "?";
    picker.appendChild(note);

    const btnRow = document.createElement("div");
    btnRow.style.cssText = "display:flex;gap:8px;flex-wrap:wrap;";
    peers.forEach(peerVal => {
      const pl = PLATAFORMAS.find(p => p.value === peerVal);
      const b = document.createElement("button");
      b.className = "picker-peer";
      b.textContent = pl.label;
      b.onclick = () => {
        chains.push([val, peerVal]);
        const fmt = active.get(val) || "";
        active.set(val, fmt);
        active.set(peerVal, fmt);
        picker.remove();
        renderFormatoRows();
        generarSKU();
      };
      btnRow.appendChild(b);
    });
    picker.appendChild(btnRow);
    row.after(picker);
  }

  document.getElementById("cliente").addEventListener("change", function () {
    const submarcaSelect = document.getElementById("submarca");
    submarcaSelect.innerHTML = '<option value="">—</option>';
    const subs = SUBMARCAS[this.value];
    if (subs) {
      Object.entries(subs).forEach(([nombre, abr]) => {
        const o = document.createElement("option");
        o.value = abr; o.textContent = nombre;
        submarcaSelect.appendChild(o);
      });
    }
    generarSKU();
  });

  document.getElementById("submarca").addEventListener("change", generarSKU);
  document.getElementById("fecha").addEventListener("change", generarSKU);

  function formatearFecha(fecha) {
    if (!fecha) return "";
    const [y, m, d] = fecha.split("-");
    return `${d}${m}${y}`;
  }

  function generarSKU() {
    const cliente = document.getElementById("cliente").value;
    const submarca = document.getElementById("submarca").value;
    const fecha = document.getElementById("fecha").value;
    const resultadoDiv = document.getElementById("resultado");
    resultadoDiv.innerHTML = "";

    if (!cliente) return;

    const fechaFormateada = formatearFecha(fecha);
    const chainedPlats = new Set(chains.flat());

    function buildSKU(tokens) {
      const partes = [cliente];
      if (submarca) partes.push(submarca);
      if (fechaFormateada) partes.push(fechaFormateada);
      tokens.forEach(t => partes.push(t));
      return partes.join("-");
    }

    if (active.size === 0) {
      const partes = [cliente];
      if (submarca) partes.push(submarca);
      if (fechaFormateada) partes.push(fechaFormateada);
      renderChip(partes.join("-"), resultadoDiv);
      return;
    }

    // SKUs de grupos encadenados
    chains.forEach(group => {
      const allActive = group.every(v => active.has(v));
      if (!allActive) return;
      const fmt = active.get(group[0]) || "";
      const tokens = [...group];
      if (fmt) tokens.push(fmt);
      renderChip(buildSKU(tokens), resultadoDiv);
    });

    // SKUs individuales
    [...active.keys()].forEach(val => {
      if (chainedPlats.has(val)) return;
      const fmt = active.get(val) || "";
      const tokens = [val];
      if (fmt) tokens.push(fmt);
      renderChip(buildSKU(tokens), resultadoDiv);
    });
  }

  function renderChip(sku, container) {
    const chip = document.createElement("div");
    chip.className = "sku-chip";
    const span = document.createElement("span");
    span.textContent = sku;
    const btn = document.createElement("button");
    btn.className = "copy-btn";
    btn.textContent = "Copiar";
    btn.onclick = () => {
      navigator.clipboard.writeText(sku).then(() => {
        btn.textContent = "¡Copiado!";
        setTimeout(() => btn.textContent = "Copiar", 2000);
      });
    };
    chip.appendChild(span);
    chip.appendChild(btn);
    container.appendChild(chip);
  }
</script>
</body>
</html>
